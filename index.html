<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Memories</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
  background: #fafafa;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

img, video, audio {
  width: 100%;
  border-radius: 8px;
}

video { max-height: 180px; }

.file-link {
  display: block;
  padding: 10px;
  background: #eee;
  border-radius: 6px;
}

#textModal {
  display: none;
  position: fixed;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 20px;
  max-width: 80%;
  max-height: 70%;
  overflow-y: auto;
  border: 2px solid #333;
}
</style>
</head>

<body>

<h1>Shared Memories</h1>

<input type="file" id="fileInput" multiple />
<button id="uploadBtn">Upload</button>

<div>
<textarea id="newTextContent"></textarea><br>
<input id="newTextName" placeholder="file.txt">
<button id="createTextBtn">Create Text</button>
</div>

<div id="progress"></div>

<div>
<button id="prevBtn">Prev</button>
<span id="pageIndicator">Page 1</span>
<button id="nextBtn">Next</button>
</div>

<div class="gallery" id="gallery"></div>

<div id="textModal">
<pre id="textContent"></pre>
<button onclick="document.getElementById('textModal').style.display='none'">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyDeQYSlrxKrE1DL29UW7Ao34B25I0ypJ5s",
  authDomain: "raffilove-dcc1b.firebaseapp.com",
  projectId: "raffilove-dcc1b",
  storageBucket: "raffilove-dcc1b.firebasestorage.app",
});

const db = getFirestore(app);
const storage = getStorage(app);

const gallery = document.getElementById("gallery");
const pageIndicator = document.getElementById("pageIndicator");

let pageStack = [];
let currentPage = 0;
const pageSize = 50;

// -------- TEXT MODAL --------

async function openText(url) {
  const modal = document.getElementById("textModal");
  const content = document.getElementById("textContent");

  modal.style.display = "block";
  content.textContent = "Loading...";

  try {
    const res = await fetch(url);
    let txt = await res.text();

    if (txt.length > 100000) {
      txt = txt.slice(0, 100000) + "\n\n--- truncated ---";
    }

    content.textContent = txt;
  } catch {
    content.textContent = "Failed to load file.";
  }
}

// -------- RENDER --------

function renderItem(data) {
  let el;

  if (data.type.startsWith("image")) {
    el = document.createElement("img");
    el.src = data.url;

  } else if (data.type.startsWith("video")) {
    el = document.createElement("video");
    el.src = data.url;
    el.controls = true;

  } else if (data.type.startsWith("audio")) {
    el = document.createElement("audio");
    el.src = data.url;
    el.controls = true;

  } else {
    el = document.createElement("a");
    el.textContent = data.name;
    el.className = "file-link";
    el.onclick = () => openText(data.url);
  }

  gallery.appendChild(el);
}

// -------- LOAD PAGE --------

async function loadPage(direction = "first") {
  gallery.innerHTML = "Loading...";

  let q;
  const refCol = collection(db, "photos");

  if (direction === "next" && pageStack.length) {
    q = query(refCol, orderBy("sortDate", "desc"), startAfter(pageStack.at(-1)), limit(pageSize));
    currentPage++;
  } else if (direction === "prev") {
    pageStack.pop();
    pageStack.pop();
    currentPage--;

    if (pageStack.length) {
      q = query(refCol, orderBy("sortDate", "desc"), startAfter(pageStack.at(-1)), limit(pageSize));
    } else {
      q = query(refCol, orderBy("sortDate", "desc"), limit(pageSize));
    }

  } else {
    q = query(refCol, orderBy("sortDate", "desc"), limit(pageSize));
    pageStack = [];
    currentPage = 0;
  }

  const snap = await getDocs(q);

  gallery.innerHTML = "";

  snap.forEach(doc => renderItem(doc.data()));

  const last = snap.docs[snap.docs.length - 1];
  if (last) pageStack.push(last);

  pageIndicator.textContent = "Page " + (currentPage + 1);
}

// -------- UPLOAD --------

document.getElementById("uploadBtn").onclick = async () => {
  const files = document.getElementById("fileInput").files;

  for (const file of files) {

    if (file.size > 10 * 1024 * 1024) {
      alert("Too big: " + file.name);
      continue;
    }

    const path = `uploads/${Date.now()}_${file.name}`;
    const storageRef = ref(storage, path);

    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    // attempt "date taken"
    let takenDate = file.lastModified || Date.now();

    await addDoc(collection(db, "photos"), {
      url,
      type: file.type,
      name: file.name,
      created: Date.now(),
      sortDate: takenDate
    });
  }

  loadPage("first");
};

// -------- TEXT CREATE --------

document.getElementById("createTextBtn").onclick = async () => {
  const content = document.getElementById("newTextContent").value;
  const name = document.getElementById("newTextName").value || "note.txt";

  const blob = new Blob([content], { type: "text/plain" });

  const storageRef = ref(storage, `uploads/${Date.now()}_${name}`);
  await uploadBytes(storageRef, blob);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "photos"), {
    url,
    type: "text/plain",
    name,
    created: Date.now(),
    sortDate: Date.now()
  });

  loadPage("first");
};

// -------- NAV --------

document.getElementById("nextBtn").onclick = () => loadPage("next");
document.getElementById("prevBtn").onclick = () => loadPage("prev");

// -------- INIT --------

loadPage();
</script>

</body>
</html>
