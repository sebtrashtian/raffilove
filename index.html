<!DOCTYPE html>
<html>
<head>
  <title>Shared Memories</title>

  <script type="module">
    // Import Firebase SDK modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

    // 🔑 Your NEW Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDeQYSlrxKrE1DL29UW7Ao34B25I0ypJ5s",
      authDomain: "raffilove-dcc1b.firebaseapp.com",
      projectId: "raffilove-dcc1b",
      storageBucket: "raffilove-dcc1b.firebasestorage.app",
      messagingSenderId: "912342547949",
      appId: "1:912342547949:web:876dca2c3fb04f81803be4"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const gallery = document.getElementById("gallery");
    const uploader = document.getElementById("uploader");

    // Display images/videos
    function addMedia(url, type) {
      if (type.startsWith("image")) {
        const img = document.createElement("img");
        img.src = url;
        gallery.prepend(img);
      } else if (type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        gallery.prepend(video);
      }
    }

    // Load all files from Firestore
    async function loadFiles() {
      const q = query(collection(db, "photos"), orderBy("created", "desc"));
      const snapshot = await getDocs(q);
      snapshot.forEach(doc => {
        const data = doc.data();
        addMedia(data.url, data.type);
      });
    }

    loadFiles();

    // Handle new uploads
    uploader.addEventListener("change", async (e) => {
      const files = e.target.files;
      for (const file of files) {
        const storageRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await addDoc(collection(db, "photos"), {
          url,
          type: file.type,
          created: Date.now()
        });
        addMedia(url, file.type);
      }
      uploader.value = ""; // reset input
    });
  </script>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 30px; background: #fafafa; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 30px; }
    .gallery img, .gallery video { width: 100%; border-radius: 8px; }
    .gallery video { max-height: 300px; }
  </style>
</head>

<body>
  <h1>Shared Memories</h1>
  <p>Upload and view images/videos</p>

  <input type="file" id="uploader" multiple />
  <div class="gallery" id="gallery"></div>
</body>
</html>
