<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Memories</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
      background: #fafafa;
      color: #222;
    }
    input, button {
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 30px;
    }
    .gallery img,
    .gallery video {
      width: 100%;
      border-radius: 8px;
    }
    video {
      max-height: 180px;
    }
  </style>
</head>
<body>
  <h1>Shared Memories</h1>
  <p>Upload and view images/videos</p>

  <input type="file" id="fileInput" multiple accept="image/*,video/*" />
  <button id="uploadBtn">Upload</button>

  <div class="gallery" id="gallery"></div>

  <script type="module">
    // Firebase CDN imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDeQYSlrxKrE1DL29UW7Ao34B25I0ypJ5s",
      authDomain: "raffilove-dcc1b.firebaseapp.com",
      projectId: "raffilove-dcc1b",
      storageBucket: "raffilove-dcc1b.firebasestorage.app",
      messagingSenderId: "912342547949",
      appId: "1:912342547949:web:876dca2c3fb04f81803be4"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // DOM elements
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const gallery = document.getElementById("gallery");

    // Add a media element to the gallery
    function addMedia(url, type) {
      if (type.startsWith("image")) {
        const img = document.createElement("img");
        img.src = url;
        gallery.prepend(img);
      } else if (type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        gallery.prepend(video);
      }
    }

    // Load existing gallery items from Firestore
    async function loadGallery() {
      gallery.innerHTML = "";
      const photosRef = collection(db, "photos");
      const q = query(photosRef, orderBy("created", "desc"));
      const snapshot = await getDocs(q);
      snapshot.forEach(doc => {
        const data = doc.data();
        addMedia(data.url, data.type);
      });
    }

    // Handle upload button click
    uploadBtn.addEventListener("click", async () => {
      const files = fileInput.files;
      if (!files.length) {
        alert("Please select at least one file to upload.");
        return;
      }
      uploadBtn.disabled = true;
      uploadBtn.textContent = "Uploading...";

      try {
        for (const file of files) {
          const storageRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
          await uploadBytes(storageRef, file);
          const url = await getDownloadURL(storageRef);
          await addDoc(collection(db, "photos"), {
            url,
            type: file.type,
            created: Date.now()
          });
          addMedia(url, file.type);
        }
      } catch (err) {
        console.error("Upload failed", err);
        alert("Upload failed: " + err.message);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
        fileInput.value = "";
      }
    });

    // Load gallery on page load
    loadGallery();
  </script>
</body>
</html>
