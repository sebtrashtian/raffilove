<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Memories</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 30px;
    background: #fafafa;
    color: #222;
  }
  input, button, textarea {
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 30px;
  }
  .gallery img,
  .gallery video,
  .gallery audio {
    width: 100%;
    border-radius: 8px;
  }
  .gallery audio {
    width: 100%;
  }
  video {
    max-height: 180px;
  }
  .file-link {
    display: block;
    padding: 10px;
    background: #eee;
    text-decoration: none;
    color: #333;
    border-radius: 6px;
    word-break: break-all;
  }
  #progress {
    margin: 10px 0;
  }
  #textModal {
    display: none;
    position: fixed;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 20px;
    border: 2px solid #333;
    border-radius: 8px;
    max-width: 80%;
    max-height: 70%;
    overflow-y: auto;
    z-index: 10;
  }
  #textModalClose {
    margin-top: 10px;
  }
</style>
</head>
<body>
<h1>Shared Memories</h1>
<p>Upload and view files (images, videos, audio, text)</p>

<!-- File Upload -->
<input type="file" id="fileInput" multiple accept="image/*,video/*,audio/*,.txt" />
<button id="uploadBtn">Upload</button>

<!-- Create new text file -->
<div>
  <textarea id="newTextContent" rows="3" cols="50" placeholder="Enter text file content"></textarea><br>
  <input type="text" id="newTextName" placeholder="File name.txt" />
  <button id="createTextBtn">Create Text File</button>
</div>

<div id="progress"></div>

<div class="gallery" id="gallery"></div>

<!-- Modal for viewing text files -->
<div id="textModal">
  <pre id="textContent"></pre>
  <button id="textModalClose">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDeQYSlrxKrE1DL29UW7Ao34B25I0ypJ5s",
  authDomain: "raffilove-dcc1b.firebaseapp.com",
  projectId: "raffilove-dcc1b",
  storageBucket: "raffilove-dcc1b.firebasestorage.app",
  messagingSenderId: "912342547949",
  appId: "1:912342547949:web:876dca2c3fb04f81803be4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const gallery = document.getElementById("gallery");
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const newTextContent = document.getElementById("newTextContent");
const newTextName = document.getElementById("newTextName");
const createTextBtn = document.getElementById("createTextBtn");
const progressDiv = document.getElementById("progress");
const textModal = document.getElementById("textModal");
const textContent = document.getElementById("textContent");
const textModalClose = document.getElementById("textModalClose");

const pageSize = 50;
let lastDoc = null;
let currentPage = 0;
const pages = [];

// Add media or link to gallery
function addMedia(url, type, name = "") {
  if (type.startsWith("image")) {
    const img = document.createElement("img");
    img.src = url;
    gallery.appendChild(img);
  } else if (type.startsWith("video")) {
    const video = document.createElement("video");
    video.src = url;
    video.controls = true;
    gallery.appendChild(video);
  } else if (type.startsWith("audio")) {
    const audio = document.createElement("audio");
    audio.src = url;
    audio.controls = true;
    gallery.appendChild(audio);
  } else if (type === "text/plain") {
    const link = document.createElement("a");
    link.href = "#";
    link.textContent = name || "View Text File";
    link.className = "file-link";
    link.addEventListener("click", async (e) => {
      e.preventDefault();
      const res = await fetch(url);
      const txt = await res.text();
      textContent.textContent = txt;
      textModal.style.display = "block";
    });
    gallery.appendChild(link);
  }
}

// Load a page of gallery items
async function loadPage(page = 0) {
  gallery.innerHTML = "";
  const photosRef = collection(db, "photos");
  let q = query(photosRef, orderBy("created", "desc"), limit(pageSize));
  if (page > 0 && pages[page - 1]) {
    q = query(photosRef, orderBy("created", "desc"), startAfter(pages[page - 1]), limit(pageSize));
  }
  const snapshot = await getDocs(q);
  if (snapshot.empty) return;
  snapshot.forEach(doc => {
    const data = doc.data();
    addMedia(data.url, data.type, data.name);
  });
  lastDoc = snapshot.docs[snapshot.docs.length - 1];
  pages[page] = lastDoc;
  currentPage = page;
}

// Upload files handler
uploadBtn.addEventListener("click", async () => {
  const files = fileInput.files;
  if (!files.length) return alert("Select files first");
  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";
  progressDiv.textContent = "";
  try {
    for (const [i, file] of [...files].entries()) {
      progressDiv.textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}`;
      const storageRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      await addDoc(collection(db, "photos"), { url, type: file.type, name: file.name, created: Date.now() });
    }
    progressDiv.textContent = "Upload complete!";
    fileInput.value = "";
    loadPage(currentPage);
  } catch (err) {
    console.error(err);
    alert("Upload failed: " + err.message);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "Upload";
  }
});

// Create text file handler
createTextBtn.addEventListener("click", async () => {
  const content = newTextContent.value.trim();
  const name = newTextName.value.trim() || `note_${Date.now()}.txt`;
  if (!content) return alert("Text file is empty");
  createTextBtn.disabled = true;
  try {
    const blob = new Blob([content], { type: "text/plain" });
    const storageRef = ref(storage, `uploads/${Date.now()}_${name}`);
    await uploadBytes(storageRef, blob);
    const url = await getDownloadURL(storageRef);
    await addDoc(collection(db, "photos"), { url, type: "text/plain", name, created: Date.now() });
    addMedia(url, "text/plain", name);
    newTextContent.value = "";
    newTextName.value = "";
  } catch (err) {
    console.error(err);
    alert("Failed to create text file: " + err.message);
  } finally {
    createTextBtn.disabled = false;
  }
});

// Close modal
textModalClose.addEventListener("click", () => {
  textModal.style.display = "none";
});

// Load first page on startup
loadPage(0);
</script>
</body>
</html>
