<!DOCTYPE html>
<html>
<head>
  <title>Shared Memories</title>

  <!-- Uploadcare widget -->
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDeQYSlrxKrE1DL29UW7Ao34B25I0ypJ5s",
      authDomain: "raffilove-dcc1b.firebaseapp.com",
      projectId: "raffilove-dcc1b",
      storageBucket: "raffilove-dcc1b.appspot.com",
      messagingSenderId: "912342547949",
      appId: "1:912342547949:web:da0ac6f7e3827930803be4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const gallery = document.getElementById("gallery");
    const widget = uploadcare.Widget("#uploader");

    // Function to add images/videos to the gallery
    function addMedia(fileInfo) {
      const type = fileInfo.mimeType || '';
      const url = fileInfo.cdnUrl;

      if (type.startsWith("image")) {
        const img = document.createElement("img");
        img.src = url;
        gallery.prepend(img);
      } else if (type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        gallery.prepend(video);
      }
    }

    // Load files from Firebase
    async function loadFiles() {
      const q = query(collection(db, "photos"), orderBy("created", "desc"));
      const snapshot = await getDocs(q);

      snapshot.forEach(doc => {
        const data = doc.data();
        addMedia({ cdnUrl: data.url, mimeType: data.type });
      });
    }

    loadFiles();

    // Handle new uploads
    widget.onUploadComplete(async function(info) {
      // Check if it's a group
      if (info.isGroup) {
        // Use files() and then file.promise() for each file
        const files = info.files();
        for (const file of files) {
          const fileInfo = await file.promise();
          addMedia(fileInfo);
          await addDoc(collection(db, "photos"), {
            url: fileInfo.cdnUrl,
            type: fileInfo.mimeType,
            created: Date.now()
          });
        }
      } else {
        const fileInfo = await info.promise();
        addMedia(fileInfo);
        await addDoc(collection(db, "photos"), {
          url: fileInfo.cdnUrl,
          type: fileInfo.mimeType,
          created: Date.now()
        });
      }
    });
  </script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
      background: #fafafa;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 30px;
    }

    .gallery img,
    .gallery video {
      width: 100%;
      border-radius: 8px;
    }

    .gallery video {
      max-height: 300px;
    }
  </style>
</head>

<body>
  <h1>Shared Memories</h1>
  <p>Upload and view images/videos</p>

  <!-- Uploadcare uploader -->
  <input
    type="hidden"
    role="uploadcare-uploader"
    data-public-key="a263a33adc38d6263eb1"
    data-multiple="true"
    id="uploader"
  />

  <div class="gallery" id="gallery"></div>
</body>
</html>
