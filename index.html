<!DOCTYPE html>
<html>
<head>
  <title>Memory Page</title>

  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
      background: #fafafa;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 30px;
    }

    .gallery img,
    .gallery video {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>Shared Memories</h1>
  <p>Upload and view photos & videos</p>

  <!-- Uploadcare uploader -->
  <input
    type="hidden"
    role="uploadcare-uploader"
    data-public-key="a263a33adc38d6263eb1"
    data-multiple="true"
    id="uploader"
  />

  <div class="gallery" id="gallery"></div>

  <script>
    const PUBLIC_KEY = "a263a33adc38d6263eb1";
    const gallery = document.getElementById("gallery");

    const widget = uploadcare.Widget("#uploader");

    // Handle uploads (including multi-file groups)
    widget.onUploadComplete(function(info) {
      if (info.isGroup) {
        info.files().forEach(file => {
          file.done(fileInfo => addMedia(fileInfo));
        });
      } else {
        addMedia(info);
      }
    });

    function addMedia(fileInfo) {
      if (fileInfo.isImage) {
        const img = document.createElement("img");
        img.src = fileInfo.cdnUrl;
        gallery.prepend(img);
      } else if (fileInfo.mimeType.startsWith("video")) {
        const video = document.createElement("video");
        video.src = fileInfo.cdnUrl;
        video.controls = true;
        gallery.prepend(video);
      }
    }

    // Load all existing files from Uploadcare
    async function loadImages() {
      const res = await fetch(
        `https://api.uploadcare.com/files/?pub_key=${PUBLIC_KEY}&ordering=-datetime_uploaded`,
        {
          headers: {
            "Accept": "application/vnd.uploadcare-v0.7+json"
          }
        }
      );

      const data = await res.json();

      data.results.forEach(file => {
        if (file.is_image || file.mime_type.startsWith("video")) {
          addMedia({
            isImage: file.is_image,
            mimeType: file.mime_type,
            cdnUrl: file.cdn_url
          });
        }
      });
    }

    loadImages();
  </script>
</body>
</html>
